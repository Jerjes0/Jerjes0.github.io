# Theme metadata
name = "Minimal"

[light]
  # Primary
  primary = "#1565c0"

  # Menu
  menu_primary = "#fff"
  menu_text = "#34495e"
  menu_text_active = "#2962ff"
  menu_title = "#2b2b2b"

  # Home sections
  # Increased contrast vs upstream default (was 255/255/255 vs 247/247/247)
  # so alternating sections read as clearly separated blocks.
  home_section_odd = "rgb(255, 255, 255)"
  home_section_even = "rgb(237, 240, 244)"

[dark]
  # Primary
  primary = "#bbdefb"

  link = "#bbdefb"
  link_hover = "#bbdefb"
